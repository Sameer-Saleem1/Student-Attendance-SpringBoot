<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Upload Students CSV')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 upload-card">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 mb-2">Upload Student CSV</h1>
                    <p class="text-muted mb-4">
                        Upload a CSV file with student details to begin marking attendance.
                        Expected format: <code>cmsId,name,fatherName</code>
                    </p>

                    <div th:replace="~{fragments/messages :: alerts}"></div>

                    <form th:action="@{/upload}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
                        <div class="mb-4">
                            <label for="file" class="form-label fw-semibold">CSV File</label>
                            <input type="file" class="form-control form-control-lg" id="file" name="file"
                                   accept=".csv" required/>
                            <div class="form-text">Only <strong>.csv</strong> files are accepted.</div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg px-4">
                            Upload &amp; Continue
                        </button>
                    </form>

                    <hr class="my-4"/>

                    <h2 class="h6 text-uppercase text-muted mb-3">Sample CSV Format</h2>
                    <pre class="sample-csv bg-light p-3 rounded">cmsId,name,fatherName
101,Ali Khan,Ahmed Khan
102,Sara Ali,Rashid Ali</pre>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center text-muted py-3 border-top">
    <small>Student Attendance Management System</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
