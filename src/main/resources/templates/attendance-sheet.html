<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head th:replace="~{fragments/layout :: head('Attendance Sheet')}"></head>
  <body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container py-4 flex-grow-1">
      <div
        class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2"
      >
        <div>
          <h1 class="h3 mb-1">Attendance Sheet</h1>
          <p class="text-muted mb-0">
            Mark each student as Present or Absent. Default status is Absent.
          </p>
        </div>
        <a th:href="@{/}" class="btn btn-outline-secondary">Upload New CSV</a>
      </div>

      <div th:replace="~{fragments/messages :: alerts}"></div>

      <div
        th:if="${savedFileName}"
        class="alert alert-info d-flex flex-wrap justify-content-between align-items-center gap-2"
      >
        <span
          >Last saved file: <strong th:text="${savedFileName}"></strong
        ></span>
        <a
          th:href="@{/api/attendance/download/{fileName}(fileName=${savedFileName})}"
          th:attr="data-download-url=@{/api/attendance/download/{fileName}(fileName=${savedFileName})}, data-download-name=${savedFileName}"
          class="btn btn-sm btn-success js-download-csv"
          >Download CSV</a
        >
      </div>

      <div id="attendance-alert" class="mb-3"></div>

      <form
        id="attendance-form"
        th:action="@{/api/attendance/save}"
        method="post"
      >
        <div class="card shadow-sm border-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 attendance-table">
              <thead class="table-primary">
                <tr>
                  <th scope="col">CMS ID</th>
                  <th scope="col">Student Name</th>
                  <th scope="col">Father Name</th>
                  <th scope="col" class="text-center">Attendance Status</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="student, stat : ${students}">
                  <td th:text="${student.cmsId}">101</td>
                  <td th:text="${student.name}">Ali Khan</td>
                  <td th:text="${student.fatherName}">Ahmed Khan</td>
                  <td>
                    <input
                      type="hidden"
                      th:name="|students[${stat.index}].cmsId|"
                      th:value="${student.cmsId}"
                    />
                    <div
                      class="attendance-options d-flex justify-content-center gap-3"
                    >
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="radio"
                          th:id="|present_${stat.index}|"
                          th:name="|students[${stat.index}].attendanceStatus|"
                          value="PRESENT"
                        />
                        <label
                          class="form-check-label text-success"
                          th:for="|present_${stat.index}|"
                          >Present</label
                        >
                      </div>
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="radio"
                          th:id="|absent_${stat.index}|"
                          th:name="|students[${stat.index}].attendanceStatus|"
                          value="ABSENT"
                          checked
                        />
                        <label
                          class="form-check-label text-danger"
                          th:for="|absent_${stat.index}|"
                          >Absent</label
                        >
                      </div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="d-flex justify-content-end mt-4">
          <button type="submit" class="btn btn-primary btn-lg px-5">
            Save Attendance
          </button>
        </div>
      </form>
    </main>

    <footer class="text-center text-muted py-3 border-top">
      <small>Student Attendance Management System</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const attendanceForm = document.getElementById("attendance-form");
      const attendanceAlert = document.getElementById("attendance-alert");

      attendanceForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        attendanceAlert.innerHTML = "";

        const rows = attendanceForm.querySelectorAll("tbody tr");
        const students = Array.from(rows).map((row) => {
          const cmsId = row.querySelector('input[type="hidden"]').value;
          const selected = row.querySelector('input[type="radio"]:checked');

          return {
            cmsId,
            attendanceStatus: selected ? selected.value : "ABSENT",
          };
        });

        try {
          const response = await fetch(attendanceForm.action, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ students }),
          });

          if (!response.ok) {
            const error = await response.json();
            attendanceAlert.innerHTML = `<div class="alert alert-danger" role="alert">${error.message || "Save failed."}</div>`;
            return;
          }

          window.location.href = "/attendance/success";
        } catch (error) {
          attendanceAlert.innerHTML =
            '<div class="alert alert-danger" role="alert">Save failed. Please try again.</div>';
        }
      });

      document.querySelectorAll(".js-download-csv").forEach((link) => {
        link.addEventListener("click", async (event) => {
          event.preventDefault();

          const url = link.dataset.downloadUrl;
          const fileName = link.dataset.downloadName || "attendance.csv";

          try {
            const response = await fetch(url, { method: "GET" });

            if (!response.ok) {
              const error = await response.json();
              attendanceAlert.innerHTML = `<div class="alert alert-danger" role="alert">${error.message || "Download failed."}</div>`;
              return;
            }

            const blob = await response.blob();
            const objectUrl = window.URL.createObjectURL(blob);
            const anchor = document.createElement("a");
            anchor.href = objectUrl;
            anchor.download = fileName;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            window.URL.revokeObjectURL(objectUrl);
          } catch (error) {
            attendanceAlert.innerHTML =
              '<div class="alert alert-danger" role="alert">Download failed. Please try again.</div>';
          }
        });
      });
    </script>
  </body>
</html>
