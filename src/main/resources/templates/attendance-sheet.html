<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Attendance Sheet')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
        <div>
            <h1 class="h3 mb-1">Attendance Sheet</h1>
            <p class="text-muted mb-0">Mark each student as Present or Absent. Default status is Absent.</p>
        </div>
        <a th:href="@{/}" class="btn btn-outline-secondary">Upload New CSV</a>
    </div>

    <div th:replace="~{fragments/messages :: alerts}"></div>

    <div th:if="${savedFileName}" class="alert alert-info d-flex flex-wrap justify-content-between align-items-center gap-2">
        <span>Last saved file: <strong th:text="${savedFileName}"></strong></span>
        <a th:href="@{/attendance/download/{fileName}(fileName=${savedFileName})}"
           class="btn btn-sm btn-success">Download CSV</a>
    </div>

    <form th:action="@{/attendance/save}" method="post">
        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 attendance-table">
                    <thead class="table-primary">
                    <tr>
                        <th scope="col">CMS ID</th>
                        <th scope="col">Student Name</th>
                        <th scope="col">Father Name</th>
                        <th scope="col" class="text-center">Attendance Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="student, stat : ${students}">
                        <td th:text="${student.cmsId}">101</td>
                        <td th:text="${student.name}">Ali Khan</td>
                        <td th:text="${student.fatherName}">Ahmed Khan</td>
                        <td>
                            <input type="hidden"
                                   th:name="|students[${stat.index}].cmsId|"
                                   th:value="${student.cmsId}"/>
                            <div class="attendance-options d-flex justify-content-center gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           th:id="|present_${stat.index}|"
                                           th:name="|students[${stat.index}].attendanceStatus|"
                                           value="PRESENT"/>
                                    <label class="form-check-label text-success"
                                           th:for="|present_${stat.index}|">Present</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           th:id="|absent_${stat.index}|"
                                           th:name="|students[${stat.index}].attendanceStatus|"
                                           value="ABSENT" checked/>
                                    <label class="form-check-label text-danger"
                                           th:for="|absent_${stat.index}|">Absent</label>
                                </div>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="d-flex justify-content-end mt-4">
            <button type="submit" class="btn btn-primary btn-lg px-5">Save Attendance</button>
        </div>
    </form>
</main>

<footer class="text-center text-muted py-3 border-top">
    <small>Student Attendance Management System</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
