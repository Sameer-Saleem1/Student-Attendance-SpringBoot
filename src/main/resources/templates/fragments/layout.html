<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Student Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">Student Attendance</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/}">Upload CSV</a>
            <a class="nav-link" th:href="@{/attendance}" th:if="${session.uploadedStudents != null}">Attendance Sheet</a>
        </div>
    </div>
</nav>
</body>
</html>
