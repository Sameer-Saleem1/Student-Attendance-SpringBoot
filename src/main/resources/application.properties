spring.application.name=student-attendance-system

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Multipart upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Application configuration
app.attendance.records-directory=attendance-records
app.csv.expected-headers=cmsId,name,fatherName
app.csv.attendance-header=attendance
app.csv.max-columns=3
app.session.students-attribute=uploadedStudents
app.session.saved-file-attribute=savedAttendanceFile
